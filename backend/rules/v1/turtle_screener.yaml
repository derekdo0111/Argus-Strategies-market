# 龟龟策略选股器规则 v1
# 所有阈值定义 (v2026-06-15: 收紧至目标 ~100只)

version: "v1"
updated: "2026-06-15"

conditions:
  - id: exclude_st
    type: exclude
    description: "排除ST/退市股"
    keywords: ["ST", "退", "*ST"]

  - id: exclude_cyclical
    type: exclude
    description: "排除强周期行业"
    industries:
      - 钢铁
      - 煤炭
      - 航运
      - 有色
      - 化工
      - 造纸
      - 石油石化
      - 建筑材料
      - 基础化工

  - id: list_years
    type: threshold
    description: "上市年限 > 8年"
    min_years: 8

  - id: market_cap
    type: threshold
    description: "总市值 > 200亿"
    min_billion: 200.0

  - id: roe
    type: threshold
    description: "ROE > 12%"
    min: 12.0

  - id: pe
    type: range
    description: "5 < PE < 25"
    min: 5.0
    max: 25.0

  - id: dividend_yield
    type: threshold
    description: "股息率 > 2.5%"
    min: 2.5

  - id: gross_margin
    type: threshold
    description: "毛利率 > 25%"
    min_percent: 25.0

  - id: debt_ratio
    type: threshold
    description: "资产负债率 < 60%"
    max_percent: 60.0

  - id: pb
    type: threshold
    description: "PB > 0"
    min: 0.0
