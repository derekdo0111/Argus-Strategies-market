# 龟龟策略 QRV 综合分析框架 v3
#
# QRV = Quality (质量) + Resilience (韧性) + Valuation (估值)
# v3: Q1扩展生意本质分析 + Q3增长引擎 + R2人才结构 + Layer3数据充分性
# v2: 强制量化输出 + data_summary 预处理

version: "v3"
updated: "2026-06-18"
analysis_type: qrv_integrated

# ════════════════════════════════════════════════════════════════
# 输入：统一数据包 qrv_input.yaml
# ════════════════════════════════════════════════════════════════

input_schema:
  sections:
    - name: company_profile
      description: "公司基本信息：代码、名称、行业、市值、上市日期"
      source: raw_data.basic_info + screener_result

    - name: financial_data
      description: "财务三表近5年数据：利润表、资产负债表、现金流量表"
      source: raw_data.annual_financials

    - name: cq_results
      description: "现金质量门5维度判定结果（软门，标记不淘汰）"
      source: computed.cash_quality

    - name: pr_results
      description: "穿透回报率计算结果（软门，标记不淘汰）"
      source: computed.penetration_return

    - name: dividend_repurchase
      description: "近5年分红历史 + 回购记录"
      source: raw_data.dividend_history + raw_data.repurchase_history

    - name: gate_summary
      description: "所有门禁汇总：screener + CQ + PR 判定结果"
      source: gate_results

    - name: websearch_results
      description: "5次 Tavily 搜索结果，带置信度标注"
      source: websearch

# ════════════════════════════════════════════════════════════════
# 分析框架：Q / R / V 三维度
# ════════════════════════════════════════════════════════════════

analysis_framework:

  # ── Q: Quality 质量维度 ──
  quality:
    label: "质量分析 (Quality)"
    modules:
      - id: q1_business_model
        name: "生意本质与商业模式"
        description: "卖什么？怎么卖？上下游？收款方式？轻资产/重资产？收入结构、盈利模式可持续性。"
        data_refs: ["financial_data.income", "A7_business_profile"]
        websearch_ref: "q_websearch"

      - id: q2_moat
        name: "竞争优势与护城河"
        description: "品牌、规模、转换成本、技术壁垒、成本优势。外来者打破护城河的可能性。"
        data_refs: ["financial_data.income.gross_margin", "financial_data.income.net_profit"]
        websearch_ref: "q_websearch"

      - id: q3_growth_engine
        name: "增长引擎"
        description: "增长驱动拆分(量×价)、第二曲线进度、产能扩张(CAPEX/折旧)。"
        data_refs: ["A1_core_financials", "A7_business_profile"]
        websearch_ref: "q_websearch"

  # ── R: Resilience 韧性维度 ──
  resilience:
    label: "韧性分析 (Resilience)"
    modules:
      - id: r1_external
        name: "外部环境与宏观风险"
        description: "行业周期(见顶/上升?)、政策风险、地缘政治、国家战略定位。"
        data_refs: ["company_profile.industry", "financial_data.income.revenue"]
        websearch_ref: "r1_websearch"

      - id: r2_management
        name: "管理层与人才结构"
        description: "管理层稳定性、诚信、治理、股权激励。人才结构(研发人员占比/人均创收)。"
        data_refs: ["financial_data", "A7_business_profile"]
        websearch_ref: "r2_websearch"

      - id: r3_structure
        name: "控股结构与关联交易"
        description: "实控人风险、股东质押比例、关联交易规模与合理性。"
        data_refs: ["financial_data.balance_sheet"]
        websearch_ref: "r3_websearch"

  # ── V: Valuation 估值维度 ──
  valuation:
    label: "估值分析 (Valuation)"
    modules:
      - id: v1_value_trap
        name: "价值陷阱筛查"
        description: "低PE/高股息是否来自业务恶化？是否存在账目瑕疵或盈利质量滑坡。"
        data_refs: ["cq_results", "financial_data"]
        websearch_ref: "v_websearch"

      - id: v2_historical
        name: "历史分位值分析"
        description: "当前PE/PB/股息率在历史区间的位置。"
        data_refs: ["company_profile.pe", "company_profile.pb", "company_profile.dividend_yield"]
        websearch_ref: "v_websearch"

      - id: v3_stress
        name: "压力测试与绝对估值"
        description: "可支配现金持续下滑情景下回报率；DCF/DDM 交叉验证合理区间。"
        data_refs: ["pr_results", "financial_data"]
        websearch_ref: null  # 不搜，LLM自行推理

# ════════════════════════════════════════════════════════════════
# WebSearch 配置：5 次 Tavily 搜索
# ════════════════════════════════════════════════════════════════

websearch:
  provider: tavily
  searches:
    - id: q_websearch
      description: "商业模式 + 护城河 + 收入结构"
      keywords:
        - "【公司名】 业务板块 收入结构 各业务营收占比 增速"
        - "【公司名】 护城河 竞争壁垒 行业地位 市占率"
        - "【公司名】 研发投入 研发费用 技术壁垒"
      merge_reason: "商模和护城河高度相关，合并搜索节省Token成本"

    - id: r1_websearch
      description: "外部环境与宏观风险"
      keywords:
        - "【公司名】 行业政策 监管风险 制裁"
        - "【公司名】 宏观经济 行业景气度 市场规模"
        - "【公司名】 竞争格局 新进入者 替代威胁"

    - id: r2_websearch
      description: "管理层与公司治理 + 人才结构"
      keywords:
        - "【公司名】 管理层 高管变动 股权激励"
        - "【公司名】 分红历史 回购 股东回报 MD&A"
        - "【公司名】 研发人员 员工人数 人才结构 人均创收 人均薪酬 应付职工薪酬"

    - id: r3_websearch
      description: "控股结构与关联交易"
      keywords:
        - "【公司名】 实控人 股权质押 大股东减持 大股东"
        - "【公司名】 关联方 关联交易 子公司 分拆上市"

    - id: v_websearch
      description: "估值与财务真实性"
      keywords:
        - "【公司名】 PE PB 估值 历史估值区间 股息率趋势"
        - "【公司名】 财务真实性 盈利质量 应收账款风险"

# ════════════════════════════════════════════════════════════════
# LLM Prompt 模板
# ════════════════════════════════════════════════════════════════

llm_config:
  role: "资深CFA持证人，15年A股价值投资经验"
  temperature: 0.2
  max_tokens: 32768

prompt_template: |
  你是一名资深CFA持证人，拥有15年A股价值投资经验。

  ## 任务
  基于提供的数据包，对【{company_name} {ts_code}】进行QRV三维综合分析，输出专业投资分析报告。

  ## 核心铁律 (MUST FOLLOW)
  1. **无数字不结论**：每个判断必须附具体数字，禁止使用「较高」「偏低」「显著」「大幅」「稳健」「不错」等模糊词
  2. **无来源不引用**：每个数字必须标注出处。引用格式：[A2]表示data_summary.A2, [W-q-3]表示websearch.q_websearch第3条snippet
  3. **数据缺失就声明**：某维度缺少数据时写「数据缺失」，绝不编造
  4. **表格优于段落**：能用Markdown表格呈现的用表格，不要写成段落

  ## 输入数据包说明 + 分析深度指引

  **你必须先阅读 data_summary 中的 data_sufficiency 块！** 它告诉你每个维度的数据覆盖质量：
  - 🟢 rich → 深度分析，输出完整表格
  - 🟡 partial → 有数据但不完整，标注缺失项
  - 🔴 missing → 直接写「数据缺失，跳过此维度」

  ```
  +-- 板块A: data_summary（预处理引擎提取，所有数字已核验，可直接引用）
  |   A1. 核心财务指标5年趋势表 (v3: 20+字段含EPS/FCF/商誉/应收周转/存货周转/固定资产比)
  |   A2. 业务收入结构线索 (websearch标记)
  |   A3. 分红回购5年统计
  |   A4. CQ门5维度判定明细
  |   A5. PR穿透回报率明细
  |   A6. 估值快照
  |   A7. 生意属性 (收款方式/轻资产/现金转化周期) ★NEW v3
  |   data_sufficiency: 每维度数据质量评级 ★NEW v3
  |
  +-- 板块B: websearch_results（联网搜索完整结果，5模块各有N条snippet）
  |
  +-- 板块C: financial_data_raw（原始财务三表，近10年逐行明细，作为A1的交叉验证和补充）
  ```

  ## data_sufficiency 使用规则 (v3 新增)

  你收到的数据包中 data_summary 末尾包含 `data_sufficiency` 块，
  它标注了每个维度的数据覆盖质量:
  - 🟢 rich:   数据充足 → 必须深度分析，输出完整表格
  - 🟡 partial: 部分覆盖 → 尽力输出，标注缺失项
  - 🔴 missing: 数据缺失 → 直接写「数据缺失，跳过此维度」，禁止编造

  在你开始分析前，请先阅读 data_sufficiency 的完整内容。

  ## Q — 质量分析 (Quality)

  ### Q1 商业模式分析
  【必含输出项 — 缺一项扣分】

  #### Q1.1 生意本质（新增 v3 — 半定量）
  数据来源：data_summary.A7 + websearch.q_websearch

  | 维度 | 具体描述 | 量化支撑 | 来源 |
  |------|---------|:------:|------|
  | 卖什么 | (产品/服务具体形态) | — | [W-q] |
  | 怎么卖 | (直销/经销/项目制/订阅) | 经销占比=?% | [W-q] |
  | 上游 | (核心供应商、集中度) | 前5供应商占比=?% | [W-q] |
  | 下游 | (G端/B端/C端占比) | 各端占比 | [A2]/[W-q] |
  | 收款方式 | (先款后货/先货后款) | 应收周转=?天 [A7] | [A7]+[W-q] |
  | 生意属性 | (轻资产/重资产, 高周转/高毛利) | 固定资产占比=?% 存货周转=?天 [A7] | [A7] |

  收款方式解读:
  - 应收周转<60天 → 接近现款现货或先款后货，回款迅速
  - 应收周转60-180天 → 正常行业信用周期
  - 应收周转>180天 → 疑似先货后款，客户议价力可能过强
  
  生意属性解读:
  - 固定资产占比<20% → 轻资产模式
  - 20-45% → 中等资产
  - >45% → 重资产模式

  #### Q1.2 收入结构表（必须）
  从data_summary.A2和websearch.q_websearch提取：

  | 业务板块 | 最新年营收(亿) | 占比(%) | YoY增速(%) | 毛利率(%) | 增长驱动因素 |
  |----------|:---------:|:------:|:------:|:-----:|------------|
  | (逐行列出) | ? | ? | ? | ? | ? |
  | **合计** | **?** | **100%** | **?** | — | — |

  如某格子数据缺失写「N/A」，表后说明哪条搜索未搜到。引用来源如「[W-q-5]」

  #### Q1.3 盈利质量5年趋势表（必须）
  数据来源：data_summary.A1（v3: 扩展版含20+字段）

  | 指标 | 2021 | 2022 | 2023 | 2024 | 2025 | 趋势判断 |
  |------|------|------|------|------|------|---------|
  | 营收(亿) | ? | ? | ? | ? | ? | ? |
  | 营收YoY(%) | ? | ? | ? | ? | ? | ? |
  | 净利润(亿) | ? | ? | ? | ? | ? | ? |
  | EPS(元) | ? | ? | ? | ? | ? | ? |
  | 毛利率(%) | ? | ? | ? | ? | ? | ? |
  | 净利率(%) | ? | ? | ? | ? | ? | ? |
  | ROE(%) | ? | ? | ? | ? | ? | ? |
  | 经营CF/净利润 | ? | ? | ? | ? | ? | ? |
  | FCF/净利润 | ? | ? | ? | ? | ? | ? |
  | 应收周转(天) | ? | ? | ? | ? | ? | ? |
  | 存货周转(天) | ? | ? | ? | ? | ? | ? |
  | 固定资产占比(%) | ? | ? | ? | ? | ? | ? |
  | CAPEX/折旧 | ? | ? | ? | ? | ? | (x) |

  此表至少列出营收/毛利/净利/ROE行，其他行数据缺失可跳过。
  趋势判断: 「up」=5年增>5%, 「down」=降>5%, 「stable」=波动<5%.

  #### 商业模式结论（80字以内）
  基于以上两表，引用至少2个具体数字

  ---

  ### Q2 护城河分析
  【必含输出项】

  #### 护城河量化指标表（必须）
  | 护城河维度 | 量化指标 | 当前值 | 竞品/行业对比 | 来源 |
  |-----------|---------|:------:|------------|------|
  | 市场地位 | 全球/国内市占率 | ?% | 第二名=?% | [W] |
  | 技术壁垒 | 研发投入(亿)/研发占比(%) | ? | 行业均值=? | [W] |
  | 成本优势 | 毛利率(%) | ?% | 竞品毛利率=?% | [A1] |
  | 客户粘性 | 中标率/续约率/政府项目占比 | ? | — | [W] |
  | 规模效应 | 自产率/年产能 | ? | — | [W] |

  #### 护城河趋势
  - 毛利率近5年变化：列出每年的具体值 [A1]
  - 市占率近5年趋势：引用websearch中带年份的数据 [W]
  - 研发投入：近3年金额和占比 [A1/W]

  #### 护城河结论（50字）
  引用上表至少2个数字

  #### 护城河可攻破性评估（新增 v3）
  - 技术颠覆风险: 是否有新技术可能替代当前产品/服务? 引用websearch中的技术趋势讨论 [W-q]
  - 跨界竞争威胁: 互联网巨头/白牌/替代品是否在侵蚀市场份额? [W-q]
  - 护城河趋势: 是在变宽(市占率↑/研发↑/毛利率↑)还是变窄? [A1] + [W-q]
  - 结论: 「护城河在XXX方面呈XX趋势, 未来X年内被打破的可能性为 XX%」

  ---

  ### Q3 增长引擎分析（新增 v3）
  【必含输出项 — 数据缺失则声明跳过】

  #### 增长驱动拆分（数据缺失可跳过）
  | 驱动因素 | 贡献说明 | 数据来源 |
  |---------|---------|---------|
  | 量增 | (产品销量增长/新客户) | [W-q] |
  | 价增 | (提价/产品升级) | [W-q]/[A1] |

  #### 第二曲线进度
  | 新业务 | 当前营收(亿) | 占总营收比(%) | 近3年增速(%) | 是否盈利 |
  |--------|:------:|:------:|:------:|:------:|
  | (从websearch/A2提取) | ? | ? | ? | ? |

  #### 产能与扩张
  | 指标 | 最新值 | 趋势 | 含义 |
  |------|:------:|------|------|
  | CAPEX/折旧 | ? x | [A1] | >1.2扩张, 0.8-1.2维持, <0.8可能吃老本 |
  | 固定资产/总资产 | ?% | [A1] | 轻/重资产判断 |

  #### 增长引擎结论（50字）

  ## R — 韧性分析 (Resilience)

  ### R1 外部环境评估
  【必含输出项】

  #### 风险清单表（必须）
  | 风险类型 | 风险描述 | 严重程度 | 影响量化 | 来源 |
  |---------|---------|:------:|---------|------|
  | 地缘政治 | (如实体清单) | 高/中/低 | 海外收入占比=?% | [W] |
  | 国内宏观 | (如财政压力) | 高/中/低 | 某业务占比从?%降至?% | [A2/W] |
  | 竞争加剧 | (新进入者) | 高/中/低 | 市占率变化=? | [W] |
  | 汇率风险 | 海外收入汇率 | 高/中/低 | 海外收入占比=?% | [A] |
  | 政策监管 | (如集采/反垄断) | 高/中/低 | 影响业务线占比=?% | [W] |

  每个风险必须引用至少一个来源

  #### 行业周期位置
  - 行业所处阶段（渗透率、市场规模、增速、驱动力转换）
  - 引用websearch中的行业规模数据
  - 见顶信号判断: 量跌价涨 = 可能见顶；量价齐升 = 成长期

  #### 国家战略定位（新增 v3）
  - 是否在十四五/十五五重点规划? 国产替代/自主可控赛道?
  - 引用websearch中的政策文件引用 [W-r1]
  - 此维度数据缺失则声明跳过

  #### 外部环境结论（50字）

  ---

  ### R2 管理层评估
  【必含输出项】

  #### 管理层画像表（必须）
  | 维度 | 具体事实 | 来源 |
  |------|---------|------|
  | 核心人物 | 姓名、职位、任职年限 | [W-r2] |
  | 稳定性 | 近5年高管变动次数 | [W-r2] |
  | 股权激励 | 覆盖人数/占比/频次 | [W-r2] |
  | 业绩指引达成率 | ? | [W-r2] |
  | 负面事件 | 近期有无违规/处罚/调查 | [W-r2] |

  #### 股东回报记录（必须，来源data_summary.A3）
  | 年份 | 每股分红(元) | 分红总额(亿) | 回购金额(亿) | 合计回报(亿) |
  |------|:------:|:------:|:------:|:------:|
  | 2021 | ? | ? | ? | ? |
  | 2022 | ? | ? | ? | ? |
  | 2023 | ? | ? | ? | ? |
  | 2024 | ? | ? | ? | ? |
  | 2025 | ? | ? | ? | ? |
  | **5年合计** | — | **?** | **?** | **?** |

  #### 人才结构（新增 v3 — 数据缺失则跳过）
  | 指标 | 数值 | 来源 |
  |------|:------:|------|
  | 员工总数 | ? | [W-r2] |
  | 研发人员数/占比 | ? / ?% | [W-r2] |
  | 人均创收(万) | ? | [A1计算: 营收/员工数] |
  | 人均薪酬(万) | ? | [W-r2] |
  | 核心技术人才流失风险 | — | [W-r2定性] |

  #### 管理层结论（50字）
  引用至少一个具体事件或数字

  ---

  ### R3 控股结构评估
  【必含输出项】

  #### 股权结构表（必须）
  | 股东名称 | 持股比例(%) | 性质 | 质押/减持情况 | 来源 |
  |---------|:------:|------|------------|------|
  | (列出前3-5大股东) | ? | ? | ? | [W-r3] |

  #### 关联交易风险
