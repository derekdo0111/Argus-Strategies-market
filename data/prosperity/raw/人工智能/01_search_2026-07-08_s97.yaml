- content: '第十届中国国际人工智能大会及展示会暨人工智算力与算法高峰论坛于10月28日至29日举办。东兴证券认为,人工智能行业当前处于政策、技术、需求三维共振阶段,叠加“人工智能+”行动带来自上而下的政策赋能及潜在资金支撑,国产芯片及云计算龙头在业绩上逐步验证、大厂CapEx持续投入推高行业发展确定性。人工智能行业景气度仍有上行空间,其在科技投资领域的主线地位较难撼动。第一上海证券认为,看好AI应用驱动的算力需求持续高增长,海内外AI应用进入商业化的拐点时刻。国产算力端,国产算力产能瓶颈即将突破,预计2026年国产芯片将迎来放量。海外算力端,OpenAI等海外AI大厂商业化加速,推动AI应用的广泛落地,算力硬件需求维持高景气。

