- content: 近期,全国多地推出新一轮人工智能(AI)产业扶持政策。例如,北京市经济和信息化局正式启动2026年第三批人工智能赋能新型工业化高质量数据集建设单位公开征集;上海张江科学城管委会则开启了二季度张江AI创新小镇专项券政策申报通道。据梳理,今年以来各地AI产业扶持政策总体呈现三大特征:第一,从技术研发驱动转向场景落地驱动;第二,从普惠性支持转向精准化引导;第三,相关政策不断强化扶持的市场导向。接受《证券日报》记者采访的专家表示,国内AI产业扶持政策的演进,既反映了中国AI产业从技术攻坚到价值转化的阶段性特征,又为企业在不同区域、不同领域的战略布局提供了清晰的指引。市场导向不断强化今年以来,围绕AI产业全生命周期发展,多地出台一系列补贴举措,逐步构建起算力支持降成本、研发补贴攻难关、场景奖补促落地、税收优惠稳预期的产业扶持“工具箱”。在各种工具协同发力下,我国AI产业商业化成果正加速落地。记者通过梳理各地补贴细则发现,场景应用奖补成为增长最快的类型。从全国范围看,此类补贴单个项目扶持额度普遍介于100万元至2000万元之间,补贴拨付比例维持在15%至30%,覆盖工业制造、政务服务、金融、医疗等多类垂直应用领域。值得注意的是,各地奖补覆盖的应用场景持续拓宽。以6月份北京出台的《北京市关于支持工业企业提质增效若干措施》为例,政策明确支持企业采购并消费词元(Token)开展人工智能应用,对符合条件的企业,根据其实际使用Token情况给予资金支持。此外,年内AI产业扶持政策的另一个显著特征是,政策支持正从“广谱式”的通用技术扶持,向针对特定垂直领域的“精准滴灌”转变。以AI微短剧领域为例,相关政策核心在于激励AI技术在内容生产、虚拟人制作及海外发行等环节的规模化应用。例如,5月份,上海印发《上海市加快推进人工智能赋能微短剧高质量发展的若干措施》,提出对价值、内容、品质并重的优秀微短剧项目
