- content: '本报记者

    田鹏

    随着AI技术不断成熟和应用场景持续拓展,人工智能产业正加速迈入价值兑现的关键阶段。透过多家相关上市公司2025年半年报可以发现,“技术落地创收”“降本增效减亏”“业务转型盈利”正成为行业趋势,“赚钱”能力成为企业关注焦点。

    据Wind资讯统计,2025年上半年,A股102家“人工智能+”领域上市公司中,有83家净利润为正,合计达1788.52亿元,盈利公司数量及规模同比分别增长3.75%和34.74%。

    受访专家表示,当前,人工智能行业发展重心正转向可持续商业价值的实现与规模化落地,并沿着“垂直深耕—消费扩展—生态构建”的路径稳步推进。短期来看,人工智能企业主要在垂直行业中寻求应用突破,同时,定制化服务需求显著增长,相关企业或通过收取定制开发费、运维服务费及业务效果分成获得收入;中期阶段,多模态大模型和技术融合将推动消费级应用爆发,如依据计算资源消耗、模型调用次数和数据存储量等维度灵活计费,形成稳定持续的收入来源;长期发展中,通用人工智能有望在交通、能源、工业制造等关键领域展露广泛商业价值,如AI将驱动虚拟经济、数字孪生城市等新产业生态的形成,盈利模式进一步扩展至虚拟资产交易、场景内广告、数据服务以及大型智慧城市建设项目运营等多个维度。

    盈利态势持续向好

    从上半年人工智能上市公司业绩表现来看,增长成为主旋律。上述102家“人工智能+”领域上市公司中,超六成企业(共64家)实现净利润同比提升,直观反映出人工智能行业盈利态势持续向好,产业发展基本面愈发稳固。

    进一步拆解业绩表现可见,既有企业凭借核心业务的爆发式发展,实现净利润规模翻倍增长;也有此前处于亏损区间的企业,通过业务调整与策略优化实现亏损幅度收窄,逐步向营收与利润的正向循环靠拢,行业整体韧性与发展活力进一步增强。

    数据显示,上述64家企业中,有13家实现净利润同比翻番。其中,拓维信息系统股份有限公司('
