- content: '本文为节选内容,更多报告请关注公众号:微之火一、对2026年形势的基本判断(一)人工智能产业规模将持续增长2025年,全球人工智能产业呈现蓬勃发展态势,人工智能市场规模迅猛增长。根据市场研究机构Precedence

    Research数据,全球人工智能市场规模在2025年将达到7575.8亿美元,同比增长18.7%,我国人工智能产业受益于DeepSeek、通义千问等生成式人工智能技术成熟应用和“人工智能+”行动的持续深入,规模呈现爆发式增长态势,已成为全球人工智能产业发展的主力军。根据工业和信息化部数据,截至2025年9月,我国人工智能核心产业规模超过9000亿元,人工智能企业数量超过5300家,国家级人工智能专精特新“小巨人”企业超400家,整体实力居全球第一梯队。展望2026年,我国人工智能将维持高速增长态势,继续引领全球人工智能行业应用发展。根据Precedence

    Research预测,2026年全球人工智能市场规模将达到9000亿美元,亚太市场仍为全球增速最快的地区。多家市场研究机构看好2026年我国人工智能市场发展,如MRFR预测2025-2035年我国人工智能市场规模的复合增长率将达到30.6%,Statista预测41.8%(2025-2031年),Grand

    View

    Research预测更高为47.1%(2025-2030年)。(二)人工智能技术将迎来多维升级2025年,人工智能技术演进走向“新范式”,原生多模态、强逻辑推理、时空物理感知等技术加速突破。阿里、百度等企业持续加码能够统一理解与生成不同模态信息的原生多模态大模型,从训练初期就融合文本、图像、视频、音频等多模态数据,实现了理解与生成一体化。清华大学等团队研发的SALMONN音视频大模型在多项权威评测中超越GPT-4o和Google

    Gemini等主流模型,在视频描述、问答等综合任务上表现出色。'
