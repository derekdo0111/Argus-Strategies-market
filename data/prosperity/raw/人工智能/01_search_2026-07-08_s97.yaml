    第一上海证券认为,看好AI应用驱动的算力需求持续高增长,海内外AI应用进入商业化的拐点时刻。国产算力端,国产算力产能瓶颈即将突破,预计2026年国产芯片将迎来放量。海外算力端,OpenAI等海外AI大厂商业化加速,推动AI应用的广泛落地,算力硬件需求维持高景气。(文章来源:证券时报网)'
