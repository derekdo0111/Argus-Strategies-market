- content: 财联社7月26日电,2025世界人工智能大会于今日开幕。以A股人工智能板块的86家公司为统计对象,整体来看,经历了2022年的增速放缓后,2023年以来,人工智能公司营收增长再次提速。2024年A股人工智能公司营业收入总额突破6000亿元,较上一年增长超10%(可比口径)。根据机构一致预测的营业收入中值计算,2025年、2026年A股人工智能公司的营业收入增速有望保持双位数,2025年预测营业收入增速接近19%,2026年预测增速接近16%。从2025年上半年的业绩来看,目前已发布2025年半年报业绩预告的21家人工智能公司中(不含业绩类型为“不确定”的公司),业绩预喜率近六成,含6家扭亏公司。
