    2014

    年以后基本保持在

    20%左右的净利润年增长率,今年前三个季度的净利润同比增长率已达到

    22.44%。

    净利润增速中枢从

    10

    年~13

    年间的高于营收增速到

    14~17

    年间显著低于营收增速来看,主要原因是机器人价格随着国产化的逐步提升,机器人价格处于下滑趋势中,但随着整个行业规模不断提升以及新兴产业对国产化机器人需求的拉动,未来营收和业绩端增速保持同步的拐点已不远。同时,和工业企业利润同比增长情况对比来看,10~13

    年从营收增速基本和工业企业利润同比增速保持同向,且平均幅度也基本一致,周期保持约

    1

    年的滞后。

    这说明,工业机器人在这一阶段和工业企业补库存扩产能的周期同步,工业机器人的应用场景还基本停留在原有行业当中,人口红利拐点仍未形成质变效应。但

    2014

    年之后工业机器人行业营收增速与工业企业利润同比增速相关性显著降低,增长形成单边行情。

    我们判断这是工业机器人在产能扩张、技术提升、需求场景不断丰富(这一点最关键,因为出现了机器替换人的强需求,而且是人不愿意做的行业,例如

    3C

    行业)、进口替代等多项变化的共同作用下的结果,总量、结构同时利好国产机器人行业。

