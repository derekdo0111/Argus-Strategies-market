- content: '一、营收、净利润规模不断扩大,增速与工业企业利润紧密相关

    我国机器人行业营业总收入一直维持增长,其中自

    2013

    年以来营收增势明显加速,2016

    年的营收同比增长率已超

    40%。

    目前,2017

    年前三个季度的营收同比增长率为

    38%,预计

    2017

    年全年营收同比增长率很有可能也超过

    40%。与营收变化趋势相似,净利润在

    2012

