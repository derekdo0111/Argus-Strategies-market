    价格强劲上涨有望继续带动存储厂商的业绩高成长。10.

    铠侠预计FY26Q1(4-6月)营收及利润都将实现显著环比增长,其中预计营业收入将达17500亿日元,环比增长74.5%;Non-GAAP营业利润将达13000亿日元,营业利润率将超74%,Non-GAAP净利润预计8700亿日元,净利润率接近50%。11.

