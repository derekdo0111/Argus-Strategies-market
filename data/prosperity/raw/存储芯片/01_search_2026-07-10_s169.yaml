    深科技

    产业细分:消费电子零部件及组装

    盈利能力:净资产收益率9.09%,毛利率18.32%,净利率9.19%

    业绩预测:本年度暂无机构做出业绩预测

    主营产品:高端制造为最主要收入来源,收入占比54.20%,毛利率9.71%

    公司亮点:深科技产品线覆盖高端DRAM/FLASH封测到模组制造的全产业链,为国内最大的独立DRAM内存芯片封测企业。

    第9

    雅克科技

    产业细分:半导体材料

    盈利能力:净资产收益率12.59%,毛利率30.96%,净利率11.96%

