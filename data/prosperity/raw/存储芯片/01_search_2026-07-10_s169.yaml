- content: '中国报告大厅网讯,2026年2月13日早盘,A股存储芯片板块逆势走强,涨幅居市场前列。存储芯片价格持续攀升推动厂商盈利水平突破历史峰值,叠加AI应用需求爆发与国产替代加速,行业正迎来新一轮增长周期。市场数据显示,存储芯片企业2025年业绩表现亮眼,19家上市公司净利润同比翻倍,国产设备采购占比显著提升,产业链共振效应显著。

    一、存储芯片板块领涨,厂商盈利创纪录

    中国报告大厅发布的《2025-2030年中国芯片行业市场分析及发展前景预测报告》指出,2月13日早盘,A股存储芯片概念低开高走,板块涨幅达1.07%。深科技、精测电子涨超8%,京仪装备、朗科科技等多股涨幅超5%。行业盈利水平同步刷新历史纪录,2025年第四季度DRAM营业利润率已达60%,首次超过高带宽内存(HBM)。2026年第一季度DRAM利润率更将突破历史峰值,64GB服务器内存价格较去年四季度翻倍,二季度有望突破1000美元关口。

    二、供需缺口扩大,AI需求成核心驱动力

    存储器行业产值规模预计2026年突破5516亿美元,远超同期晶圆代工的2187亿美元。AI应用场景扩张推动高效能存储设备需求激增,北美云计算服务商自2025年底起大幅增加采购,刺激企业级SSD订单爆发。2026年第一季度Enterprise

    SSD价格预计暴涨53%-58%,创下单季最大涨幅纪录。服务器DRAM价格环比涨幅达80%-90%,供需缺口持续扩大。

    三、国产替代加速,设备企业订单爆发

    国内存储原厂扩产带动设备需求激增,中芯国际2025年国产设备采购占比提升至35%,较2023年翻倍增长。北方华创以45%市占率成为长鑫存储核心设备供应商,新增订单超25亿元;中微公司刻蚀设备市占率突破35%。国产存储产业链形成“原厂扩产—设备受益”的共振效应,设备企业成为本轮周期最大赢家。

    四、业绩与股价齐升,19股净利润翻倍

