- content: '相关报告显示,得益于人工智能相关应用以及数据中心基础设施持续的需求,2025年全球半导体销售额达到7956亿美元,同比增长26.2%。全球存储芯片销售额达到2300亿美元,同比增长39%。

    有分析认为,当前存储原厂扩产面临主客观双重约束,2026年有效产能释放受限,预计新产能实质释放需待2027年底至2028年,且过程中供给增速上修空间有限。

