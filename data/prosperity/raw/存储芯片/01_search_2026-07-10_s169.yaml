- content: '“精选摘要:多关注直接受益存储价格上涨的存储芯片厂商,忽略了存储相关配套芯片厂商的成长性。我们认为,存储相关配套芯片有望充分受益存储整体量的成长及迭代升级。相关领域的国内企业持续布局新产品,推动自身成长。在内存模组相关领域,CPU在AI服务器用量增加将推动内存模组需求增长,内存接口芯片、SPD等芯片有。”1.

    核心观点事件:长鑫科技IPO更新财报,26Q1实现营收508亿元,实现净利润330亿元,扣非归母净利润263亿元。2.

    据我们测算,26Q1长鑫科技营收环比增速达71%。3.

    公司指引26H1实现营收1100-1200亿元,实现净利润660-750亿元,实现扣非归母净利润520-580亿元。4.

    存储供需紧张持续,厂商业绩继续强劲成长。5.

    部分投资者担忧消费电子需求可能承压,影响存储需求及未来价格涨幅。6.

    但我们认为AI存储需求强劲,存储价格有望继续保持强劲表现。7.

    供给方面,存储原厂优先分配位元产出至服务器相关存储产品,有望推动消费电子存储领域同样保持供给紧张态势。8.

