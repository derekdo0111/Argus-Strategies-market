- content: '一、行业发展概述

    存储芯片又称为半导体存储器,主要是指以半导体电路作为存储媒介的存储器,通常用于保存二进制数据的记忆设备,是现代数字系统的重要组成部分。存储芯片具有存储速度快、体积小等特点,广泛运用于U盘、内存、消费电子、固态存储硬盘、智能终端等领域。目前对存储行业而言,存储芯片主要以两种方式实现产品化;一是ASIC技术实现存储芯片,二是FPGA

    技术实现存储芯片。其中ASIC(专用集成电路)在存储和网络行业已经得到了广泛应用。

    资料来源:公开资料整理,观研天下整理

    二、市场触底反弹,目前存储芯片行业进入复苏周期

    进入2022年,受终端需求不振和产业链库存高企影响,全球存储行业经历了一场“史无前例”的危机,例如三星电子利润暴跌97%,SK海力士创纪录亏损,美光科技、西部数据等存储大厂库存攀升,存储芯片价格跌入谷底等。

    再上述环境下,自2023年一季度开始,三星、SK

    海力士、美光、西部数据和铠侠等厂商纷纷宣布减少产能,厂商降低关于存储业务的资本性支出,到2023年第三季度随着减产效应开始奏效,供需关系持续改善。各大厂商不约而同的减产计划促使存储周期提前,从2023下半年存储价格开始反弹,存储市场重新步入上行周期。据相关行业数据显示,上游存储晶圆价格自2023

    年第三季度开始触底反弹,至2024

    年3

    月已上涨30%。

    2024年以来,当前全球AI浪潮推动存储需求爆发,叠加终端需求逐步回暖,晶圆代工产能利用率回升,存储芯片市场加速复苏,行业景气度持续攀升,价格上涨幅度有所扩大。数据显示,2024一季度全球半导体销售额同比+15%,其中存储表现亮眼,同比增长86%。

