- content: 一、背景依据为贯彻落实区委、区政府关于支持人工智能产业创新发展,构建人工智能产业生态高地的总体要求,依据《浙江省人民政府印发关于支持人工智能创新发展若干措施的通知》(浙政发〔2025〕10号)、《杭州市加快建设人工智能创新高地实施方案(2025年版)》(杭政函〔2025〕65号)等文件,结合萧山区实际,制定《关于促进人工智能产业创新发展的若干政策(2025版)》(以下简称《政策》),以推动我区集成电路产业链协同发展。二、主要内容和政策举措一、提升创新能级1.鼓励企业牵头承担国家和省市技术攻关任务,对符合政策规定的项目,按照国家、省实际到账资助经费的30%给予补助,最高不超过5000万元。2.每年安排最高5000万元模型扶持资金,对成功落地并市场化的优秀应用择优奖励;对获得中央网信办生成式人工智能模型备案的企业,按市级政策配套支持。3.鼓励开源人工智能相关成果,对表现优秀的开发企业,按市级政策给予配套支持。二、完善技术要素4.每年安排最高1亿元算力券,对符合条件的企业,按智算服务金额的50%给予算力券补贴,单个主体年度最高2000万元。5.每年安排最高5000万元数据要素扶持资金,对高质量语料集实施奖补,单家企业最高200万元;对购买非关联方语料进行人工智能应用研发的企业,按上一年度交易结算费用的30%资助,最高200万元。6.支持建设人工智能产业公共服务平台,对年服务企业数达50家以上且年服务交易额达1000万元以上的,每年给予最高200万元运营经费补贴。三、推广应用示范7.对入选省、市级人工智能标杆企业的,分别给予一次性50万元、30万元奖励。8.对入选省、市级人工智能服务商的,分别给予一次性30万元、15万元奖励。9.对入选省、市级标杆的智能终端和智能装备单品,分别给予一次性20万元、10万元奖励。10.每年安排最高1000万元“场景券”,对“揭榜挂帅”且满足进度要求
