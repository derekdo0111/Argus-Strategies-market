- content: '五家头部科技企业引领中国AI行业格局

    证券市场周刊

    罗伯特·利亚(Robert

    Lea)

    2026年,中国AI行业格局将继续围绕少数几家国内科技巨头进行整合,不过各公司的战略路径分野或将导致不同的结果。中国AI格局围绕五家头部科技企业展开作为推动中国AI发展的核心技术主要国内供应商,DeepSeek、阿里巴巴和华为在国家“人工智能+”战略中发挥着重要作用。这项核心国家政策旨在通过将AI推广至社会和工业的各个领域,以提升中国的经济生产力。(剩余1690字)'
