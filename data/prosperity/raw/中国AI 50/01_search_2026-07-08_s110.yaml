- content: '人工智能简称为AI。它是研究、开发用于模拟、延伸和扩展人的智能的理论、方法、技术及应用系统的一门新的技术科学。

    近年来,人工智能发展迅速,国家颁布一系列利好政策,促进中国人工智能步入新阶段。

    2015-2019年人工智能政策汇总

    时间

    政策名称

    主要内容

    2015年5月

    《中国制造2025》

    加快推动新一代信息技术与制造技术融合发展,把智能制造作为两化深度融合的主攻方向;着力发展智能装备和智能产品,推进生产过程智能化。

    2015年7月

    《国务院关于积极推进“互联网+”行动的指导意见》

    2015年7月《国务院关于积极推进“互联网+”行动的指导意见》将人工智能列为其11项重点行动之一。具体行动为:培育发展人工智能新兴产业;推进重点领域智能产品创新;提升终端产品智能化水平。主要目标是加快人工智能核心技术突破,促进人工智能在智能家居、智能终端、智能汽车、机器人等领域的推广应用。

    2016年3月

    《中华人民共和国国民经济和社会发展第十三个五年规划纲要》

    加快信息网络新技术开发应用,重点突破大数据和云计算关键技术、自主可控操作系统、高端工业和大型管理软件、新兴领域人工智能技术,人工智能写入“十三五”规划纲要。

    2016年4月

    《机器人产业发展规划(2016-2020年)》

    到2020年,自主品牌工业机器人年产量达到10万台,六轴及以上工业机器人年产量达到5万台以上。服务机器人年销售收入超过300亿元;工业机器人主要技术指标达到国外同类产品水平;机器人用精密减速器、伺服电机及驱动器等关键零部件取得重大突破。

    2016年5月

    《“互联网+”人工智能三年行动实施方案》

    到2018年,打造人工智能基础资源与创新平台,人工智能产业体系基本建立,基础核心技术有所突破,总体技术与产业发展与国际同步,应用及系统级技术局部领先。

