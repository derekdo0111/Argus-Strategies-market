- content: '为了到2030年成为人工智能领域的全球领导者,我国正在部署涵盖从芯片到应用的整个人工智能技术栈的产业政策工具。这些人工智能产业政策的制定和拓展,引发了两个问题:

    1、我国政府正在采取哪些措施来支持人工智能产业?

    2、

    这些产业措施是否有效?

    中国的人工智能产业政策可能会加速中国在人工智能领域的快速发展,尤其是通过对研究、人才、计算补贴和应用的支持。中国的人工智能模型正在缩小与美国顶尖模型的性能差距,中国人工智能的应用正在各个领域快速增长,从电动汽车、机器人到医疗保健和生物技术。虽然这种增长主要源于中国民营科技企业的创新,但国家的支持也有助于提升中国人工智能产业的竞争力。

    然而,即使有政府的大力支持,还是有许多瓶颈亟待克服:美国主导的对人工智能芯片以及生产此类芯片所需的半导体制造设备的出口管制,限制了中国人工智能开发者可用的计算能力。计算资源的匮乏迫使中国企业在投资模型开发的短期进展和构建长期的制裁抵御能力之间做出权衡。

    中国的人工智能产业政策将通过为本已强大的行业提供人才和资本,帮助中国企业与美国人工智能公司竞争,这种发展既受益于私人市场的竞争,也受益于中国政府的投资。

    一、中国人工智能政策目标和工具

    中国与美国在人工智能方面的政策目标和论述有所不同。在美国,人工智能政策论述有时被描述为“通用人工智能竞赛”;而相比之下,我国对人工智能论述则不那么抽象,更加侧重于希望人工智能能够促进国家的经济发展并增强国力,即支持整体经济目标的经济和工业应用。

    到2030年,我国的目标是将人工智能打造成为一个价值1000亿美元的产业,并在其他行业创造超过1万亿美元的附加值。这一目标包括利用人工智能升级医疗保健、制造业和农业等传统行业。此外,它还包括利用人工智能赋能新兴产业,特别是具有实体应用的硬科技领域,例如机器人、自动驾驶汽车和无人系统。

