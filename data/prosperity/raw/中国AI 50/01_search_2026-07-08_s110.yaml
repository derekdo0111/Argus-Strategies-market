- content: '格隆汇12月16日|《2025德勤中国高科技高成长50强及明日之星报告》与榜单今日发布。报告显示,今年中国50强企业三年累计营收增长率的平均值为490%,相比2024年略有下降,但Top10企业营收增长率相比2024年基本持平。从营收规模上,2025中国50强企业中营收为5000万-1亿的公司占比显著提升至38%,营收规模1亿以上公司占比44%,与去年持平。从地域分布上,大湾区占比达52%,深圳、上海、北京、广州稳居前列。德勤中国高科(600730)技高成长项目全国主管合伙人赵锦东表示:“23%的中国50强企业和66%的明日之星企业,AI研发投入占营收的50%以上。但无论是中国50强企业还是明日之星企业,都面临着高技术人才的短缺、AI技术在业务场景中的应用不足以及研发成本攀升等挑战。此外,越来越多的科技企业将AI智能体从工具化向数字员工化演进。”

