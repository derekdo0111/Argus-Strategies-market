- content: '多地推出新一轮人工智能产业扶持政策

    AI产业迎来强心针。2025年开年以来,人工智能赛道热度不减。从大模型混战到行业应用落地,从算力基础设施到数据要素流通,AI以前所未有的速度渗透进各行各业。3月初,工信部正式宣布新一轮AI产业扶持政策,明确提出将加大力度支持AI核心技术攻关、推动“人工智能+”行动纵深发展,并围绕算力、算法、数据三大要素出台补贴与税收优惠。这一信号给正在寻找增长突破口的企业注入了一剂强心针。过去两年,国内AI产业经历了爆发式增长。据工信部数据,截至2024年底,我国人工智能核心产业规模已突破6000亿元,相关企业数量超过4500家。然而,繁荣背后也藏着隐忧:许多中小企业在AI落地时面临技术门槛高、投入大、回报周期长的问题;部分企业盲目跟风大模型,却缺乏实际应用场景,最终陷入尴尬境地。在此背景下,工信部新政的出台显得尤为及时。新政聚焦三大方向:强化基础层支撑,对算力中心建设给予最高30%的补贴;加速应用层渗透,设立“人工智能+”专项基金,重点扶持智能制造、智慧金融、数字营销等场景;降低企业使用门槛,鼓励第三方服务商提供轻量化、模块化的AI工具,让中小企业也能用得起、用得好。政策红利之下,市场风向正在悄然转变。过去企业关注的是有没有AI,现在更关心AI能不能真正创造价值。比如在客户获取环节,传统的竞价排名、广告投放成本越来越高,转化率却持续走低。而基于生成式引擎优化的新玩法,正成为企业破局的关键。'
