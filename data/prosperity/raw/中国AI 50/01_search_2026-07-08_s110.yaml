- content: '中国AI芯片市场的核心矛盾在于:美国出口管制如何重塑供需格局,特别是Nvidia

    H20芯片禁售与复售的反复。报告开篇即指出,“需求方面,中国AI芯片需求在2025年预计达395亿美元;供应方面,即便H20恢复销售,全年仍可能出现25亿美元缺口”。原先预计的126亿美元缺口因7月15日Nvidia宣布“正向美国政府申请H20许可并有望很快恢复交付”而被压缩,预计可回补105亿美元销售,加上B30新品28亿美元、AMD约10亿美元以及本土厂商额外15亿美元,“2025年中国AI芯片总供应约370亿美元,但仍短缺25亿美元”。H20复售的最大受益者是本地云服务商和互联网巨头。渠道调研显示,“2024年字节跳动、阿里巴巴、腾讯、百度合计占H20出货量的80%以上”,预计2025年它们仍将是最大买家,快手等新晋厂商亦将加入。尽管B30在H20禁售前因规格下调、ASP降低约50%而ROI与H20相近,国内大型互联网公司仍“对B30兴趣浓厚,潜在订单接近100万片”,但交付节奏受制于供应链前置时间,短期需通过租赁缓解。美国出口管制意外为本土AI芯片企业打开窗口。报告预计,“中国AI芯片市场的国产化率将从2023年的17%跃升至2027年的55%”,主要得益于“本土芯片性能持续进步及DeepSeek之后国内7nm产能快速扩张”。2025年的主要瓶颈仍是“代工产能与CoWoS封装”,但到2027年行业可能“由供给受限转为需求受限,进而对ASP形成下行压力”。华为昇腾、寒武纪、海光被视为第一梯队国产玩家,其910C、Siyuan

    590、DCU3等产品已在FP16算力上接近A100,虽与Nvidia最新芯片差距仍大,但已能满足推理及中小模型训练需求。2025年中国AI资本开支预计达人民币6550亿元(折合910亿美元),同比增51%,其中多半用于芯片采购;剔除海外投资后,国内加速器市场约人'
