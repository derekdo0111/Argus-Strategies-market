- content: '12月16日于无锡惠山发布的《2025德勤中国高科技高成长50强及明日之星报告》显示,今年中国50强企业三年累计营收增长率的平均值为490%,相比2024年略有下降,而Top10企业营收增长率相比2024年基本持平。

    从营收规模来看,2025中国50强企业中营收为5000万~1亿元的公司占比显著提升至38%,营收规模1亿元以上公司占比44%,与去年持平,整体呈现出中小企业营收区间占比提升、头部企业营收区间保持稳定的特征。

    从地域分布而言,大湾区占比达52%,深圳、上海、北京、广州稳居前列,一线城市凭借成熟的产业基底、充足的人才储备与密集的资本资源,仍是科技企业的主要诞生地。

    在行业分布方面,硬件行业以28%的占比居首,高端装备以18%位列第二,前者受益于半导体领域的增长,后者则依托智能制造细分赛道的亮眼表现。清洁技术因新能源企业入选较多,占比提升至10%。软件、生命科学较上年有所下降,互联网行业降幅显著,体现行业向硬科技转型的趋势。

    德勤中国高科技高成长项目全国主管合伙人赵锦东表示,在企业推动科技与创新时,人才、资本与AI研发投入成为三大关键驱动力。调研显示,23%的中国50强企业和66%的明日之星企业,AI研发投入占营收的50%以上。但无论是中国50强企业还是明日之星企业,都面临着高技术人才的短缺、AI技术在业务场景中的应用不足以及研发成本攀升等挑战。然而,核心技术自主研发、产品的快速迭代和多元化融资正成为企业韧性发展的突破口。此外,越来越多的科技企业将AI智能体从工具化向数字员工化演进,以全面提升效率、创新力与竞争优势。

    全球科技行业正经历一场由AI驱动的深层次变革,算力主权竞争、开源模型生态崛起、软硬件融合下的具身智能落地、AI智能体进化,以及AI全域化赋能,共同构成当前AI科技的核心发展趋势。“在这趋势的带动下,中国科技行业的高潜赛道已向多领域拓展布局,企业凭借技术'
