- content: '中国人工智能作为数字产业的核心环节,竞争格局呈现出鲜明的结构分化特征,国内政策层面明确了新一代人工智能的发展目标,到2030年核心产业规模突破1万亿元,带动相关产业规模超过10万亿元,产业发展的政策支持力度持续加大。工信部数据显示,2024年中国人工智能核心产业规模接近6000亿元,整体人工智能相关产业规模突破7000亿元,国内人工智能相关企业数量超4500家,产业规模保持中高速增长,2023年核心产业规模同比增长13.9%,增长态势稳定。

    一、供给端竞争格局

    1.1产业链分层竞争

    1.1.1骨干企业分层结构

    人工智能产业链按技术和业务形态划分为基础层、技术层、应用层三个核心环节,基础层主要提供算力、数据等底层支撑,技术层聚焦通用算法模型、细分技术模块开发,应用层则面向垂直场景输出解决方案。国内对不同层级骨干企业的结构统计清晰反映了当前产业发展的阶段特征,早期产业发展以底层技术突破为主,随着大模型技术落地成熟,产业资源加速向应用端倾斜,大量企业转向场景落地开发,这一结构变化也符合全球人工智能产业的发展脉络,当前国内骨干企业的分层占比维持在相对稳定的区间,结构特征明确。

    表1

    2024年中国人工智能骨干企业分层结构占比

    产业链环节骨干企业占比(%)

    基础层9.93

    技术层28.60

    应用层61.47

    这一结构反映出国内人工智能产业已经完成早期技术积累,进入场景落地的红利期,超过六成的骨干企业集中在应用层,说明产业落地的活跃度较高。基础层占比不足一成,一定程度上反映出底层技术环节的进入门槛较高,中小玩家难以突破,产业资源仍向头部集中,长期来看基础层的技术突破仍是产业发展的核心驱动力。

    1.1.2大模型赛道供给竞争

    大模型作为技术层的核心赛道,是当前产业竞争的焦点,国内大模型发布数量在2023-2024年出现爆发式增长,截至2024年3月累计发布数量达到478个,这一规模远超全'
