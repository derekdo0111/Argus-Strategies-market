    中财网

    中财网讯:数据显示,全球半导体市场进入高速增长期。WSTS预测2025年营收同比增长22.5%至7720亿美元,2026年再增26.3%至9750亿美元,逼近万亿美元大关。区域表现分化,亚太地区同比增长45.0%,中国地区增长17.3%,美洲增长30.5%。

    一份研报观点认为,处理器、高带宽内存以及网络组件等AI半导体是核心驱动力,2025年其销售额占比接近行业总量的三分之一。研报指出,随着AI基础设施支出2026年突破1.3万亿美元,到2029年AI半导体将占据全球半导体销售额的50%以上。这意味着电子元器件产业链将长期受益于AI资本开支的持续扩张。

    研报认为,中国作为重要市场虽增速相对温和,但全球AI浪潮带来的订单转移和本土需求提升,仍将为相关企业提供显著增量。基本面来看,半导体营收连续两年20%以上高增长,直接支撑上游材料、芯片设计和封测环节的业绩弹性。

    总结起来,研报侧重点是AI技术对半导体需求的爆发式拉动,行业整体高景气有望延续,相关电子元器件个股的业绩和估值都具备向上催化空间。投资者可重点关注AI算力链条的核心标的,把握这一轮技术驱动的增长行情。

    中财网'
