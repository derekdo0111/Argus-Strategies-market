- content: '中国AI芯片市场在2025至2026年迎来了爆发式增长。大模型和算力需求的激增,推动了国产AI芯片从“研发烧钱”向“规模化盈利”的转折。以下是国内几大核心AI芯片研发公司的全方位对比。一、

    核心企业市场格局与基本面目前,中国AI芯片研发阵营主要形成了以华为昇腾和海光信息为双雄,寒武纪为纯芯片设计龙头,以及摩尔线程、沐曦股份、昆仑芯等新贵紧随其后的格局。1.

    华为(昇腾Hisilicon)性能与进展:核心产品为昇腾910B及新一代昇腾910C。910C在FP16运算下的峰值效能达800

    TFLOP/s,性能已与英伟达H100相当。2025年,华为推出“384超节点系统”,用成百上千颗芯片集群的“群狼战术”来弥补单卡差异。目前,包括DeepSeek在内的国内主流大模型已深度适配昇腾生态。市占率:独占鳌头。2025年在中国AI芯片市场的出货量约81.2万颗,市占率达到20%至23%左右,与英伟达并列中国市场第一,也是本土份额最高的品牌。机构预测其2026年市场份额可能冲刺50%。营收与利润:属于华为集团非独立上市业务,未单独披露净利润。但由于出货量巨大,其芯片板块已实现极高的商业闭环和自我造血能力。2.

    海光信息($海光信息(SH688041)$高端处理器龙头)性能与进展:采用“CPU+DCU”双轮驱动。其AI芯片产品为深算系列DCU(深度学习加速器)。最新深算三号性能相比前代翻倍,主打“类CUDA”的高生态兼容性,已经成功打入大型互联网巨头的数据中心供应链。市占率:在中国AI加速器市场中占比约2%~3%,但在国产x86服务器CPU市场份额超过50%,CPU与DCU的协同效应极强。营收与利润(2025年报):营业收入:143.77亿元,同比增长56.92%,首次突破百亿大关。

    归母净利润:25.45亿元,同比增长31.79%。

    2026最新进展:2026年一季度营收达40.34亿'
